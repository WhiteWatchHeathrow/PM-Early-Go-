<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Early Go</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:system-ui;
background:#eef2f5;
padding:20px;
max-width:650px;
margin:auto;
}

h1{text-align:center;}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:12px;
box-shadow:0 3px 6px rgba(0,0,0,0.15);
}

.leader{
border:3px solid #4CAF50;
}

.bar{
height:8px;
background:#ddd;
border-radius:6px;
margin-top:6px;
overflow:hidden;
}

.fill{
height:100%;
background:#4CAF50;
}

button{
margin-top:8px;
margin-right:6px;
padding:6px 10px;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Early Go</h1>

<div id="board"></div>

<div style="text-align:center;margin-top:20px">

<button onclick="tie()">Tie Break 🎲</button>
<button onclick="reset()">Reset</button>

</div>

<h3>History</h3>

<ul id="log"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {

apiKey:"YOURKEY",
authDomain:"YOURAPP.firebaseapp.com",
databaseURL:"https://YOURAPP-default-rtdb.firebaseio.com",
projectId:"YOURAPP",
storageBucket:"YOURAPP.appspot.com",
messagingSenderId:"XXXX",
appId:"XXXX"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const refData=ref(db,"earlygo");

let data;

onValue(refData,(snap)=>{

data=snap.val();

if(!data){

data={

players:[
{name:"Person 1",points:0},
{name:"Person 2",points:0},
{name:"Person 3",points:0},
{name:"Person 4",points:0},
{name:"Person 5",points:0},
{name:"Person 6",points:0},
{name:"Person 7",points:0}
],

history:[]

};

save();

}

render();

});

function save(){
set(refData,data);
}

window.stay=function(i){

data.players[i].points++;
save();

}

window.early=function(i){

data.players[i].points--;

let name=data.players[i].name;
let date=new Date().toLocaleDateString();

data.history.unshift(name+" left early ("+date+")");

save();

}

window.rename=function(i,name){

data.players[i].name=name;
save();

}

window.tie=function(){

let max=Math.max(...data.players.map(p=>p.points));
let tied=data.players.filter(p=>p.points===max);

let winner=tied[Math.floor(Math.random()*tied.length)];

alert("Tie winner: "+winner.name);

}

window.reset=function(){

if(confirm("Reset scores?")){

data.players.forEach(p=>p.points=0);
data.history=[];

save();

}

}

function render(){

data.players.sort((a,b)=>b.points-a.points);

let max=Math.max(...data.players.map(p=>p.points),1);

let board=document.getElementById("board");
board.innerHTML="";

data.players.forEach((p,i)=>{

let percent=(p.points/max)*100;

let div=document.createElement("div");
div.className="card";

if(i===0) div.classList.add("leader");

div.innerHTML=`

<div contenteditable="true"
onblur="rename(${i},this.innerText)">
<b>${p.name}</b> — ${p.points}
</div>

<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>

<button onclick="stay(${i})">+ Stay</button>
<button onclick="early(${i})">- Early</button>

`;

board.appendChild(div);

});

let log=document.getElementById("log");
log.innerHTML="";

data.history.forEach(h=>{

let li=document.createElement("li");
li.textContent=h;

log.appendChild(li);

});

}

</script>

</body>
</html>
